name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Root version bump (used when no changesets are pending)"
        type: choice
        options: [patch, minor, major]
        default: minor

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Guard — only release from master
        if: github.ref != 'refs/heads/master'
        run: |
          echo "Release must be run from master (got ${{ github.ref }})"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build i18n messages
        run: pnpm --filter @ultimate-ts-starter/i18n build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: node scripts/release-version.mjs ${{ inputs.bump }}

      - name: Commit, tag, push
        run: |
          git add -A
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD --follow-tags

      - name: Deploy server to Cloudflare Workers
        run: pnpm --filter server deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy web to Cloudflare Workers
        run: pnpm --filter web deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create GitHub release
        run: gh release create "v${{ steps.version.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
