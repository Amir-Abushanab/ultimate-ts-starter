name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build i18n messages
        run: pnpm --filter @ultimate-ts-starter/i18n build

      - name: Lint & format
        run: pnpm exec vp check

      - name: Typecheck
        run: pnpm check-types

      - name: Unit & integration tests
        run: pnpm test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build i18n messages
        run: pnpm --filter @ultimate-ts-starter/i18n build

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

  build:
    name: Build (web + server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build i18n messages
        run: pnpm --filter @ultimate-ts-starter/i18n build

      - name: Build web
        run: pnpm --filter web build

      - name: Build server (dry run)
        run: pnpm --filter server exec wrangler deploy --dry-run
